name: islamic_kids_app
description: A kids-friendly Islamic learning app with Qaidah Quiz, Islamic Quiz, and Daily Tasks.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Local Storage
  shared_preferences: ^2.2.2

  # Ads (Google AdMob)
  google_mobile_ads: ^8.0.0

  # In-App Purchases
  in_app_purchase: ^3.1.13

  # Local Notifications
  flutter_local_notifications: ^21.0.0

  # Audio Player for sound effects
  audioplayers: ^6.0.0

  # Timezone for notifications
  timezone: ^0.11.0

  cupertino_icons: ^1.0.6
  google_fonts: ^8.1.0
  video_player: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4


flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/images/
    - assets/videos/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_logo.png"
  min_sdk_android: 21

